name: ⚔️ Aethoria RPG Engine v3

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

# ─── Fila sequencial — evita conflitos de commit ───────────────────────────
concurrency:
  group: aethoria-rpg-queue
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  process_action:
    # Só processa issues com prefixo rpg: ou comentários com /atacar em issues [RAID], ignora bots
    if: |
      (github.event_name == 'issues' && startsWith(github.event.issue.title, 'rpg:') && !contains(github.event.issue.user.login, '[bot]')) ||
      (github.event_name == 'issue_comment' && startsWith(github.event.issue.title, '[RAID]') && startsWith(github.event.comment.body, '/atacar') && !contains(github.event.comment.user.login, '[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Para lidar com os possíveis pull requests ou pull --rebase antes do push devido a possíveis race conditions com outras coisas. O concurrency resolve o principal, mas por segurança puxamos.
      - name: 🔄 Configurar Git e Atualizar
        run: |
          git config user.name  "Aethoria Bot ⚔️"
          git config user.email "aethoria-bot@users.noreply.github.com"
          git pull --rebase origin main

      # Cache do Python — economiza ~20s por execução
      - name: 🐍 Setup Python 3.11 (cached)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: ⚔️ Processar ação RPG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            python rpg/engine.py "rpg:raid_attack:${{ github.event.issue.number }}" "${{ github.event.comment.user.login }}"
          else
            python rpg/engine.py "${{ github.event.issue.title }}" "${{ github.event.issue.user.login }}"
          fi

      - name: 💾 Commit resultado
        run: |
          git add README.md rpg/state.json rpg/leaderboard.json "rpg/players/" "rpg/raids.json" || true
          # Só commita se houve mudança real
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            MSG="⚔️ [@${{ github.event.comment.user.login }}] Raid Attack nas Cavernas"
          else
            MSG="⚔️ [@${{ github.event.issue.user.login }}] ${{ github.event.issue.title }}"
          fi
          
          git diff --staged --quiet || \
            git commit -m "$MSG" \
                       -m "Turno processado por Aethoria Engine v3"
          git push

      - name: 💬 Comentar e fechar Issue (apenas para ações normais)
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const login  = context.payload.issue.user.login;
            const action = context.payload.issue.title;
            const repo   = `${context.repo.owner}/${context.repo.repo}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `⚔️ **Aethoria Engine v3** processou: \`${action}\``,
                ``,
                `@${login} — Confira o resultado no [README do perfil](https://github.com/${repo}#readme).`,
                ``,
                `> *"A profecia se move. Cada escolha importa."*`,
                ``,
                `---`,
                `> ℹ️ Esta issue foi gerada automaticamente pelo jogo. Pode ser fechada com segurança.`
              ].join('\n')
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state:  'closed',
              labels: ['rpg-action']
            });
