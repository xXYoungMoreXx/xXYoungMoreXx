name: 🐍 Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: 🐍 Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: xXYoungMoreXx
          outputs: |
            dist/snake.svg?color_snake=#58a6ff&color_dots=#ebedf0,#c0d8f7,#71a6ed,#377fe6,#005bd1
            dist/snake-dark.svg?palette=github-dark&color_snake=#58a6ff&color_dots=#0d1117,#00388c,#0056cc,#1a7fef,#58a6ff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
