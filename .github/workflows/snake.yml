name: 🐍 Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: 🐍 Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: xXYoungMoreXx
          outputs: |
            dist/snake.svg?color_snake=%2358a6ff&color_dots=%23ebedf0,%23c0d8f7,%2371a6ed,%23377fe6,%23005bd1
            dist/snake-dark.svg?palette=github-dark&color_snake=%2358a6ff&color_dots=%230d1117,%2300388c,%230056cc,%231a7fef,%2358a6ff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
